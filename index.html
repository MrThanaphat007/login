<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link href="style.css" rel="stylesheet">
</head>    
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-6 mx-auto p-0">
                <div class="card">
                    <div class="box">
                        <div class="form-snip">
                            <input type="radio" id="tab-1" name="tab" class="sign-in" checked>
                            <label for="tab-1" class="tab">Login</label>
                            
                            <input type="radio" id="tab-2" name="tab" class="sign-up">
                            <label for="tab-2" class="tab">Sign-Up</label>
                            
                            <div class="user-form">
                                <div class="login-form">
                                    <label>Username</label>
                                    <input type="text" placeholder="Enter Username">
                                    <label>Password</label>
                                    <input type="password" placeholder="Enter Password">
                                    <button class="btn btn-primary mt-3 mb-3">Sign in</button>
                                    <a href=""><span class="text-secondary">Forgot Password?</span></a>
                                </div>
                                <div class="sign-up-form">
                                    <label>Username</label>
                                    <input type="text" placeholder="Enter username">
                                    <label>Email</label>
                                    <input type="email" placeholder="Enter Email">
                                    <label>Password</label>
                                    <input type="password" placeholder="Enter Password">
                                    <label>Repeat password</label>
                                    <input type="password" placeholder="Repeat password">
                                    <button class="btn btn-primary mt-3">Sign Up</button>
                                    <label for="tab-1">Already member?</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
